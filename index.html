<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Renta Analyzer</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;padding:20px}
.box{max-width:700px;margin:auto;background:white;padding:20px;border-radius:10px}
input,button{padding:10px;margin:5px;width:100%%}
button{background:#0b6efd;color:white;border:none;border-radius:6px}
</style>
</head>
<body>
<div class="box">
<h1>Mini Renta Analyzer v1</h1>
<p>Перша тестова версія.</p>
<label>Введіть 5 чисел через кому:</label>
<input id="nums" placeholder="1,5,12,28,35">
<button onclick="run()">Аналізувати</button>
<pre id="out"></pre>
</div>
<script>
function run(){
 const v=document.getElementById('nums').value;
 document.getElementById('out').textContent=
 "Введені числа: "+v+"\n\nНаступні модулі аналізу будуть додані поступово.";
}
</script>
</body>
</html>
